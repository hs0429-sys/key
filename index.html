<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>尖石國中鑰匙借用系統 - 管理升級版</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 font-sans text-slate-800 p-4 md:p-8">
  <div class="max-w-5xl mx-auto space-y-6">
    
    <!-- 標頭區塊 -->
    <header class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 flex items-center justify-between">
      <div class="flex items-center space-x-4">
        <div class="bg-blue-600 p-3 rounded-lg text-white shadow-sm">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>
        </div>
        <div>
          <h1 class="text-2xl font-bold text-slate-900 tracking-wide">新竹縣立尖石國民中學</h1>
          <p class="text-slate-500 font-medium mt-1 flex items-center">
            公用鑰匙借還登記系統 
            <span id="adminBadge" class="ml-3 px-2 py-0.5 bg-rose-100 text-rose-700 text-xs font-bold rounded-md hidden">後台管理模式</span>
          </p>
        </div>
      </div>
      <div class="hidden md:flex items-center space-x-4">
        <div class="text-sm text-slate-500 bg-slate-100 px-4 py-2 rounded-md font-medium flex items-center">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span id="currentDate">系統運作中</span>
        </div>
        <!-- 進入後台按鈕 -->
        <button id="adminToggleBtn" class="flex items-center text-sm text-slate-600 hover:text-slate-900 bg-white border border-slate-300 hover:bg-slate-50 px-3 py-2 rounded-md font-medium transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
          <span id="adminToggleText">管理員登入</span>
        </button>
      </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      
      <!-- 左側：借用表單 -->
      <div class="lg:col-span-1 space-y-6">
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
          <h2 class="text-lg font-bold border-b border-slate-100 pb-3 mb-4 flex items-center">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-2 text-blue-600"><circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.6 9.6"/><path d="m15.5 7.5 3 3L22 7l-3-3"/></svg>
            新增借用登記
          </h2>
          <form id="borrowForm" class="space-y-4">
            
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">身分</label>
              <select id="roleSelect" class="w-full border border-slate-300 rounded-md shadow-sm p-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-slate-50">
                <option value="師長">師長</option>
                <option value="學生">學生</option>
              </select>
            </div>

            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">借用人姓名 <span class="text-red-500">*</span></label>
              <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-400"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </div>
                <input type="text" id="borrowerName" placeholder="請輸入姓名" class="w-full border border-slate-300 rounded-md shadow-sm pl-10 p-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-slate-50" required />
              </div>
            </div>

            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">借用鑰匙/教室 <span class="text-red-500">*</span></label>
              <select id="roomSelect" class="w-full border border-slate-300 rounded-md shadow-sm p-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-slate-50">
                <option value="視聽教室">視聽教室</option>
                <option value="資科教室">資科教室</option>
                <option value="風雨教室">風雨教室</option>
                <option value="會議室">會議室</option>
                <option value="體育器材室">體育器材室</option>
                <option value="音樂教室">音樂教室</option>
                <option value="其他">其他</option>
              </select>
            </div>

            <div id="otherRoomDiv" style="display: none;">
              <label class="block text-sm font-medium text-slate-700 mb-1">請說明其他鑰匙名稱 <span class="text-red-500">*</span></label>
              <input type="text" id="otherRoomInput" placeholder="例如：教務處備用鑰匙" class="w-full border border-slate-300 rounded-md shadow-sm p-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-slate-50" />
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-md shadow transition-colors duration-150 flex justify-center items-center mt-2">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
              確認借出
            </button>
          </form>
        </div>
        
        <!-- 狀態統計 -->
        <div class="bg-slate-800 text-white rounded-xl shadow-sm p-6">
          <h3 class="text-sm font-medium text-slate-300 mb-2">當前外借數量</h3>
          <div class="text-4xl font-bold text-blue-400">
            <span id="activeCount">0</span> <span class="text-lg font-normal text-slate-400">把</span>
          </div>
        </div>
      </div>

      <!-- 右側：紀錄列表 -->
      <div class="lg:col-span-2 space-y-6">
        
        <!-- 搜尋列 -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 flex items-center">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-400 mr-3"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" placeholder="搜尋姓名或教室..." class="w-full focus:outline-none text-slate-700 bg-transparent" />
        </div>

        <!-- 未歸還表格 -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
          <div class="px-6 py-4 border-b border-slate-200 bg-amber-50">
            <h2 class="text-lg font-bold text-amber-800 flex items-center">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
              未歸還鑰匙
            </h2>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-left text-sm whitespace-nowrap">
              <thead class="bg-slate-50 text-slate-600 font-medium border-b border-slate-200">
                <tr>
                  <th class="px-6 py-3">借用人</th>
                  <th class="px-6 py-3">身分</th>
                  <th class="px-6 py-3">鑰匙名稱</th>
                  <th class="px-6 py-3">借出時間</th>
                  <th class="px-6 py-3 text-right">操作</th>
                </tr>
              </thead>
              <tbody id="activeTbody" class="divide-y divide-slate-100">
                <!-- Javascript 將渲染內容於此 -->
              </tbody>
            </table>
          </div>
        </div>

        <!-- 已歸還表格 -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden mt-6">
          <div class="px-6 py-4 border-b border-slate-200">
            <h2 class="text-lg font-bold text-slate-700 flex items-center">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-2 text-emerald-500"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
              已歸還紀錄
            </h2>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-left text-sm whitespace-nowrap">
              <thead class="bg-slate-50 text-slate-600 font-medium border-b border-slate-200">
                <tr id="pastTheadRow">
                  <th class="px-6 py-3">借用人</th>
                  <th class="px-6 py-3">身分</th>
                  <th class="px-6 py-3">鑰匙名稱</th>
                  <th class="px-6 py-3">借出時間</th>
                  <th class="px-6 py-3">歸還時間</th>
                  <!-- 後台模式下會動態插入「操作」欄位 -->
                </tr>
              </thead>
              <tbody id="pastTbody" class="divide-y divide-slate-100">
                 <!-- Javascript 將渲染內容於此 -->
              </tbody>
            </table>
            <div id="pastLimitMsg" class="p-3 text-center text-xs text-slate-400 bg-slate-50" style="display: none;">
              僅顯示最近 15 筆紀錄 (管理員模式下可見全部)
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- 客製化訊息對話框 -->
  <div id="customModal" class="fixed inset-0 bg-slate-900/50 hidden flex items-center justify-center z-[60]">
    <div class="bg-white rounded-xl shadow-lg p-6 max-w-sm w-full mx-4">
      <h3 id="modalTitle" class="text-lg font-bold text-slate-900 mb-2">提示</h3>
      <p id="modalMessage" class="text-slate-600 mb-6 whitespace-pre-wrap">訊息內容</p>
      <div class="flex justify-end space-x-3">
        <button id="modalCancelBtn" class="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 rounded-md transition-colors hidden">取消</button>
        <button id="modalConfirmBtn" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-md transition-colors">確認</button>
      </div>
    </div>
  </div>

  <!-- 後台登入密碼對話框 -->
  <div id="pinModal" class="fixed inset-0 bg-slate-900/50 hidden flex items-center justify-center z-50">
    <div class="bg-white rounded-xl shadow-lg p-6 max-w-sm w-full mx-4">
      <h3 class="text-lg font-bold text-slate-900 mb-2">管理員身分驗證</h3>
      <p class="text-sm text-slate-500 mb-4">請輸入後台管理密碼以啟用編輯與刪除權限。</p>
      <input type="password" id="adminPin" placeholder="請輸入密碼" class="w-full border border-slate-300 rounded-md shadow-sm p-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 mb-6" />
      <div class="flex justify-end space-x-3">
        <button type="button" onclick="closePinModal()" class="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 rounded-md transition-colors">取消</button>
        <button type="button" onclick="verifyPin()" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-md transition-colors">驗證登入</button>
      </div>
    </div>
  </div>

  <!-- 編輯紀錄對話框 -->
  <div id="editModal" class="fixed inset-0 bg-slate-900/50 hidden flex items-center justify-center z-50">
    <div class="bg-white rounded-xl shadow-lg p-6 max-w-md w-full mx-4">
      <h3 class="text-lg font-bold text-slate-900 mb-4 border-b pb-2">編輯借還紀錄</h3>
      <form id="editForm" class="space-y-4">
        <input type="hidden" id="editId">
        
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">借用人姓名</label>
          <input type="text" id="editBorrowerName" class="w-full border border-slate-300 rounded-md shadow-sm p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500" required />
        </div>
        
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">身分</label>
            <select id="editRole" class="w-full border border-slate-300 rounded-md shadow-sm p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
              <option value="師長">師長</option>
              <option value="學生">學生</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">狀態</label>
            <select id="editStatus" class="w-full border border-slate-300 rounded-md shadow-sm p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
              <option value="借用中">借用中</option>
              <option value="已歸還">已歸還</option>
            </select>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">鑰匙名稱</label>
          <input type="text" id="editRoom" class="w-full border border-slate-300 rounded-md shadow-sm p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500" required />
        </div>

        <div class="flex justify-end space-x-3 mt-6 pt-4 border-t border-slate-100">
          <button type="button" onclick="closeEditModal()" class="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 rounded-md transition-colors">取消</button>
          <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-md transition-colors">儲存變更</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    
    // Firebase 雲端資料庫基礎設定
    let db, auth, appId;
    try {
      const firebaseConfig = {
        apiKey: "AIzaSyAE6fCcLla04XhDG64JKPL6yCjA_e7kwD8",
        authDomain: "jianshi-key-system.firebaseapp.com",
        projectId: "jianshi-key-system",
        storageBucket: "jianshi-key-system.firebasestorage.app",
        messagingSenderId: "791669883003",
        appId: "1:791669883003:web:ab026b75b8bbb623dce2de"
      };
      
      const app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);
      appId = typeof __app_id !== 'undefined' ? __app_id : 'jsjh';
    } catch (error) {
      console.error("無法初始化雲端資料庫:", error);
    }

    // 系統狀態
    let records = [];
    let currentUser = null;
    let isAdmin = false; // 管理員模式狀態

    // --- 系統共用模組 ---
    
    // 自訂 Modal 對話框
    const modal = document.getElementById('customModal');
    function showModal(title, message, isConfirm = false) {
      return new Promise((resolve) => {
        document.getElementById('modalTitle').textContent = title;
        document.getElementById('modalMessage').textContent = message;
        modal.classList.remove('hidden');
        
        const cancelBtn = document.getElementById('modalCancelBtn');
        const confirmBtn = document.getElementById('modalConfirmBtn');
        
        if (isConfirm) {
          cancelBtn.classList.remove('hidden');
        } else {
          cancelBtn.classList.add('hidden');
        }

        const handleConfirm = () => { cleanup(); resolve(true); };
        const handleCancel = () => { cleanup(); resolve(false); };
        const cleanup = () => {
          modal.classList.add('hidden');
          confirmBtn.removeEventListener('click', handleConfirm);
          cancelBtn.removeEventListener('click', handleCancel);
        };

        confirmBtn.addEventListener('click', handleConfirm);
        if (isConfirm) cancelBtn.addEventListener('click', handleCancel);
      });
    }

    // 初始化日期
    document.getElementById('currentDate').textContent = new Date().toLocaleDateString('zh-TW') + ' 雲端同步中';

    // 表單顯示邏輯
    const roomSelect = document.getElementById('roomSelect');
    const otherRoomDiv = document.getElementById('otherRoomDiv');
    const otherRoomInput = document.getElementById('otherRoomInput');

    roomSelect.addEventListener('change', (e) => {
      if (e.target.value === '其他') {
        otherRoomDiv.style.display = 'block';
        otherRoomInput.required = true;
      } else {
        otherRoomDiv.style.display = 'none';
        otherRoomInput.required = false;
        otherRoomInput.value = '';
      }
    });

    document.getElementById('searchInput').addEventListener('input', renderTables);

    // 建立連線與監聽
    function setupDataListener() {
      if (!currentUser || !db) return;
      const recordsRef = collection(db, 'artifacts', appId, 'public', 'data', 'key_records');
      
      onSnapshot(recordsRef, (snapshot) => {
        records = snapshot.docs.map(doc => doc.data());
        records.sort((a, b) => b.id.localeCompare(a.id)); 
        renderTables();
      }, (error) => {
        console.error("資料同步失敗:", error);
      });
    }

    const initAuth = async () => {
      if (!auth) return;
      try {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
          await signInWithCustomToken(auth, __initial_auth_token);
        } else {
          await signInAnonymously(auth);
        }
      } catch (error) {
        console.error("驗證失敗:", error);
      }
    };

    if (auth) {
      initAuth();
      onAuthStateChanged(auth, (user) => {
        currentUser = user;
        if (user) setupDataListener();
      });
    }

    // --- 核心業務邏輯 ---

    // 1. 新增借用 (加入防重複機制)
    document.getElementById('borrowForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      if (!currentUser || !db) {
        await showModal('系統提示', '目前尚未連線至雲端資料庫，請確認您的操作環境。');
        return;
      }

      const borrowerName = document.getElementById('borrowerName').value.trim();
      const role = document.getElementById('roleSelect').value;
      const room = roomSelect.value;
      const otherRoom = otherRoomInput.value.trim();
      
      const finalRoomName = room === '其他' ? otherRoom : room;

      if (!borrowerName) {
        await showModal('提醒', '請填寫借用人姓名。');
        return;
      }
      if (!finalRoomName) {
        await showModal('提醒', '請填寫鑰匙名稱。');
        return;
      }

      // 【核心功能】檢查是否已經被借出 (防呆機制)
      const isAlreadyBorrowed = records.some(r => r.room === finalRoomName && r.status === '借用中');
      if (isAlreadyBorrowed) {
        await showModal('借用遭阻擋', `無法借出！\n【${finalRoomName}】的鑰匙目前正被借用中，必須先歸還才能再次借出。`);
        return; // 終止寫入程序
      }

      const newId = Date.now().toString();
      const newRecord = {
        id: newId,
        borrowerName: borrowerName,
        role: role,
        room: finalRoomName,
        borrowTime: new Date().toLocaleString('zh-TW', { hour12: false }),
        returnTime: null,
        status: '借用中'
      };

      try {
        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'key_records', newId);
        await setDoc(docRef, newRecord);
        
        document.getElementById('borrowerName').value = '';
        if (room === '其他') otherRoomInput.value = '';
      } catch (error) {
        console.error("儲存失敗:", error);
        await showModal('錯誤', '資料儲存失敗，請重試。');
      }
    });

    // 2. 一般歸還
    window.handleReturn = async function(id) {
      if (!currentUser || !db) return;
      
      const confirmed = await showModal('確認歸還', '確定這把鑰匙已經歸還了嗎？', true);
      if (confirmed) {
        try {
          const recordToUpdate = records.find(r => r.id === id);
          if (recordToUpdate) {
            const updatedRecord = {
              ...recordToUpdate,
              status: '已歸還',
              returnTime: new Date().toLocaleString('zh-TW', { hour12: false })
            };
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'key_records', id);
            await setDoc(docRef, updatedRecord); // 以覆蓋方式更新
          }
        } catch (error) {
          console.error("更新狀態失敗:", error);
          await showModal('錯誤', '狀態更新失敗，請重試。');
        }
      }
    };

    // --- 後台管理員邏輯 ---

    // 密碼彈窗控制
    document.getElementById('adminToggleBtn').addEventListener('click', () => {
      if (isAdmin) {
        // 登出管理員
        isAdmin = false;
        document.getElementById('adminBadge').classList.add('hidden');
        document.getElementById('adminToggleText').textContent = '管理員登入';
        renderTables();
      } else {
        // 登入管理員
        document.getElementById('pinModal').classList.remove('hidden');
        document.getElementById('adminPin').value = '';
        document.getElementById('adminPin').focus();
      }
    });

    window.closePinModal = function() {
      document.getElementById('pinModal').classList.add('hidden');
    }

    window.verifyPin = async function() {
      const pin = document.getElementById('adminPin').value;
      // 預設行政通關密碼： jsjh (尖石國中縮寫)
      if (pin === 'jsjh') {
        isAdmin = true;
        document.getElementById('adminBadge').classList.remove('hidden');
        document.getElementById('adminToggleText').textContent = '登出後台';
        closePinModal();
        renderTables();
        await showModal('登入成功', '已啟用後台管理權限，現在您可以修改或刪除任何紀錄。');
      } else {
        await showModal('密碼錯誤', '管理員密碼錯誤，請重新輸入。');
      }
    }

    // 允許在密碼框按 Enter 驗證
    document.getElementById('adminPin').addEventListener('keypress', function (e) {
      if (e.key === 'Enter') verifyPin();
    });

    // 刪除紀錄
    window.handleDelete = async function(id) {
      if (!isAdmin || !currentUser || !db) return;
      const confirmed = await showModal('🚨 嚴重警告：確認刪除', '確定要永久刪除這筆紀錄嗎？\n此動作將無法復原，請謹慎操作。', true);
      if (confirmed) {
        try {
          await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'key_records', id));
        } catch (error) {
          console.error("刪除失敗:", error);
          await showModal('錯誤', '刪除失敗，請重試。');
        }
      }
    }

    // 編輯紀錄 (開啟表單)
    window.openEditModal = function(id) {
      if (!isAdmin) return;
      const record = records.find(r => r.id === id);
      if (!record) return;

      document.getElementById('editId').value = record.id;
      document.getElementById('editBorrowerName').value = record.borrowerName;
      document.getElementById('editRole').value = record.role;
      document.getElementById('editRoom').value = record.room;
      document.getElementById('editStatus').value = record.status;
      
      document.getElementById('editModal').classList.remove('hidden');
    }

    window.closeEditModal = function() {
      document.getElementById('editModal').classList.add('hidden');
    }

    // 儲存編輯紀錄
    document.getElementById('editForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      if (!isAdmin || !currentUser || !db) return;

      const id = document.getElementById('editId').value;
      const originalRecord = records.find(r => r.id === id);
      if (!originalRecord) return;

      const updatedData = {
        borrowerName: document.getElementById('editBorrowerName').value.trim(),
        role: document.getElementById('editRole').value,
        room: document.getElementById('editRoom').value.trim(),
        status: document.getElementById('editStatus').value
      };

      // 如果從「借用中」改為「已歸還」，且原本沒有歸還時間，就補上時間
      if (originalRecord.status === '借用中' && updatedData.status === '已歸還') {
         updatedData.returnTime = new Date().toLocaleString('zh-TW', { hour12: false });
      }
      // 如果從「已歸還」改回「借用中」，清空歸還時間
      if (originalRecord.status === '已歸還' && updatedData.status === '借用中') {
         updatedData.returnTime = null;
      }

      try {
        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'key_records', id);
        await updateDoc(docRef, updatedData);
        closeEditModal();
      } catch (error) {
        console.error("更新失敗:", error);
        await showModal('錯誤', '更新資料失敗，請確認連線。');
      }
    });

    // --- 畫面渲染邏輯 ---

    function renderTables() {
      const searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();
      
      const filteredRecords = records.filter(record => 
        record.borrowerName.toLowerCase().includes(searchTerm) || 
        record.room.toLowerCase().includes(searchTerm)
      );

      const activeBorrows = filteredRecords.filter(r => r.status === '借用中');
      const pastBorrows = filteredRecords.filter(r => r.status === '已歸還');

      document.getElementById('activeCount').textContent = activeBorrows.length;

      // 渲染未歸還表格
      const activeTbody = document.getElementById('activeTbody');
      if (activeBorrows.length === 0) {
        activeTbody.innerHTML = `<tr><td colspan="5" class="px-6 py-8 text-center text-slate-500">目前沒有未歸還的鑰匙。</td></tr>`;
      } else {
        activeTbody.innerHTML = activeBorrows.map(record => `
          <tr class="hover:bg-slate-50 transition-colors">
            <td class="px-6 py-4 font-medium text-slate-900">${record.borrowerName}</td>
            <td class="px-6 py-4">
              <span class="px-2 py-1 rounded-full text-xs font-medium ${record.role === '師長' ? 'bg-indigo-100 text-indigo-700' : 'bg-emerald-100 text-emerald-700'}">${record.role}</span>
            </td>
            <td class="px-6 py-4 font-medium">${record.room}</td>
            <td class="px-6 py-4 text-slate-500">${record.borrowTime}</td>
            <td class="px-6 py-4 text-right">
              ${isAdmin ? `
                <button onclick="window.openEditModal('${record.id}')" class="bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1.5 rounded text-sm font-medium transition-colors mr-1">編輯</button>
                <button onclick="window.handleDelete('${record.id}')" class="bg-red-50 hover:bg-red-100 text-red-600 px-3 py-1.5 rounded text-sm font-medium transition-colors mr-1">刪除</button>
              ` : ''}
              <button onclick="window.handleReturn('${record.id}')" class="bg-amber-500 hover:bg-amber-600 text-white px-4 py-1.5 rounded text-sm font-medium shadow-sm transition-colors">歸還</button>
            </td>
          </tr>
        `).join('');
      }

      // 調整已歸還表格標題列 (管理員模式多一欄)
      const pastTheadRow = document.getElementById('pastTheadRow');
      if (isAdmin && pastTheadRow.cells.length === 5) {
         pastTheadRow.insertAdjacentHTML('beforeend', '<th class="px-6 py-3 text-right">操作</th>');
      } else if (!isAdmin && pastTheadRow.cells.length === 6) {
         pastTheadRow.deleteCell(5);
      }

      // 渲染已歸還表格 (管理員看全部，一般看15筆)
      const pastTbody = document.getElementById('pastTbody');
      const displayPastRecords = isAdmin ? pastBorrows : pastBorrows.slice(0, 15);

      if (pastBorrows.length === 0) {
        pastTbody.innerHTML = `<tr><td colspan="${isAdmin ? 6 : 5}" class="px-6 py-8 text-center text-slate-500">尚無已歸還紀錄。</td></tr>`;
      } else {
        pastTbody.innerHTML = displayPastRecords.map(record => `
          <tr class="text-slate-500 hover:bg-slate-50 transition-colors">
            <td class="px-6 py-3">${record.borrowerName}</td>
            <td class="px-6 py-3">
              <span class="px-2 py-1 rounded-full text-xs font-medium bg-slate-100 text-slate-600">${record.role}</span>
            </td>
            <td class="px-6 py-3">${record.room}</td>
            <td class="px-6 py-3 text-xs">${record.borrowTime}</td>
            <td class="px-6 py-3 text-xs text-emerald-600 font-medium">${record.returnTime}</td>
            ${isAdmin ? `
              <td class="px-6 py-3 text-right">
                <button onclick="window.openEditModal('${record.id}')" class="bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1 text-xs font-medium rounded transition-colors mr-1">編輯</button>
                <button onclick="window.handleDelete('${record.id}')" class="bg-red-50 hover:bg-red-100 text-red-600 px-3 py-1 text-xs font-medium rounded transition-colors">刪除</button>
              </td>
            ` : ''}
          </tr>
        `).join('');
      }

      document.getElementById('pastLimitMsg').style.display = (!isAdmin && pastBorrows.length > 15) ? 'block' : 'none';
    }

  </script>
</body>
</html>
